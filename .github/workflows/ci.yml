name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Build
        run: cargo build

      # Workspace members: xtask-todo-lib (default `beta-vm`), devshell-vm, xtask — 全覆盖侧车与 β 客户端。
      # NOTE: Windows MSVC cross-check runs in local pre-commit/acceptance flows (requirements §7.2), not in this CI job.
      - name: Test (workspace, includes devshell-vm and beta-vm default features)
        run: cargo test -- --test-threads=1

      - name: Clippy
        run: cargo clippy --all-targets -- -W clippy::pedantic -W clippy::nursery -D warnings

      - name: Doc (no-deps)
        run: RUSTDOCFLAGS='-D warnings' cargo doc --no-deps
