# When a tag xtask-todo-lib-v* is pushed, create a GitHub Release and attach the .crate file.
# Also supports workflow_dispatch to create a release for an existing tag (e.g. tags pushed before this workflow existed).
name: Release

on:
  push:
    tags:
      - 'xtask-todo-lib-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. xtask-todo-lib-v0.1.0). Only for manual run; leave empty on tag push.'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write  # create release and upload .crate asset
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Package crate
        run: cargo package -p xtask-todo-lib --allow-dirty
        env:
          CARGO_TERM_COLOR: never

      - name: Find .crate artifact
        id: crate
        run: |
          CRATE=$(ls target/package/xtask-todo-lib-*.crate 2>/dev/null | head -1)
          echo "path=${CRATE}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${CRATE})" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: ${{ steps.crate.outputs.path }}
          generate_release_notes: true
          body: |
            **xtask-todo-lib** — same version on [crates.io](https://crates.io/crates/xtask-todo-lib).
            Docs: [docs.rs/xtask-todo-lib](https://docs.rs/xtask-todo-lib).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # OCI image for Windows β automatic fallback (`podman run -i`; default tag matches `CARGO_PKG_VERSION`).
  devshell-vm-oci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Version from tag
        id: ver
        run: |
          REF="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${REF#xtask-todo-lib-v}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Use repository owner (not github.actor) so pushes are tied to the account namespace
          # that matches ghcr.io/${{ steps.ver.outputs.owner }}/... and GITHUB_TOKEN can admin the package.
          username: ${{ steps.ver.outputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push devshell-vm
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/devshell-vm/Containerfile
          push: true
          tags: ghcr.io/${{ steps.ver.outputs.owner }}/xtask_todo/devshell-vm:v${{ steps.ver.outputs.version }}

      # Anonymous `podman pull` requires the package to be Public (403 otherwise).
      # See docs/devshell-vm-oci-release.md §6.
      - name: Set GHCR package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          PKG_NAME='xtask_todo%2Fdevshell-vm'

          # PATCH may 404 if the package record is not yet visible to this token, path differs, or
          # visibility was already set in the UI — anonymous pull can still work; do not fail the job.
          patch_pkg_public() {
            local url=$1
            local label=$2
            echo "PATCH ${label} -> visibility=public"
            local out ec
            set +e
            out=$(gh api --method PATCH "$url" -f visibility=public 2>&1)
            ec=$?
            set -e
            if [ "$ec" -eq 0 ]; then
              return 0
            fi
            if echo "$out" | grep -qE 'HTTP 404|"status": "404"|Not Found'; then
              echo "::warning::PATCH returned 404 for ${label}; skipping (package may already be public, or set visibility in GitHub Packages UI). Job continues."
              return 0
            fi
            echo "$out" >&2
            return "$ec"
          }

          if gh api "orgs/${OWNER}" >/dev/null 2>&1; then
            patch_pkg_public "orgs/${OWNER}/packages/container/${PKG_NAME}" "orgs/${OWNER}/packages/container/${PKG_NAME}"
          else
            # /user/packages/... targets the token's API user (not the repo owner), so it 404s for
            # user-owned packages published under ${{ github.repository_owner }}. Patch the owner's package.
            patch_pkg_public "users/${OWNER}/packages/container/${PKG_NAME}" "users/${OWNER}/packages/container/${PKG_NAME}"
          fi
